owner: 940smiley
mutation_mode: dry-run
workdir: .nova-workdir

scanning:
  include_archived: false
  include_forks: false
  max_repos: 0

dependabot:
  states: [open]
  severity_floor: low
  branch_prefix: nova/dependabot-fix

pr_comment_edits:
  bot_author_allowlist:
    - dependabot[bot]
    - github-actions[bot]
    - renovate[bot]

merge:
  require_green_checks: true
  strategy: squash

exports:
  csv_log: nova_scan_log.csv
  suggestions: Nova_suggests.txt

nova:
  enabled: true
  max_alerts_in_prompt: 40
  max_issues_in_prompt: 30
  max_prs_in_prompt: 30
